{% extends "base.html" %}

{% block title %}Đăng nhập - QL Bất Động Sản{% endblock %}

{% block content %}
<div class="login-body">
    <div class="card login-card">
        <div class="login-header">
            <h1 class="login-logo"><span>Đăng Vy</span> Land</h1>
            <p class="login-subtitle">Hệ thống quản lý bất động sản cho thuê</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Tên đăng nhập</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập..." required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Mật khẩu</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu..." required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
            </button>
        </form>
    </div>
</div>
{% endblock %}
