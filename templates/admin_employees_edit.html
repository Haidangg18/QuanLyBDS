{% extends "base.html" %}

{% block title %}Chỉnh sửa tài khoản - QL Bất Động Sản{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="fa-solid fa-user-pen"></i> Chỉnh Sửa Thông Tin Nhân Sự</h1>
    <a href="{{ url_for('admin_employees') }}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Quay lại danh sách</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-pen-to-square"></i> Cập nhật tài khoản</h3>
    <form action="{{ url_for('admin_employees_edit', user_id=user.MaTaiKhoan) }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Tên đăng nhập *</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user.TenDangNhap }}" required>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Mật khẩu *</label>
            <input type="text" id="password" name="password" class="form-control" value="{{ user.MatKhau }}" required>
        </div>

        <div class="form-group">
            <label for="fullname" class="form-label">Họ và tên *</label>
            <input type="text" id="fullname" name="fullname" class="form-control" value="{{ user.HoTen }}" required>
        </div>

        <div class="form-group">
            <label for="phone" class="form-label">Số điện thoại</label>
            <input type="tel" id="phone" name="phone" class="form-control" value="{{ user.SoDienThoai if user.SoDienThoai else '' }}">
        </div>

        <div class="form-group">
            <label for="role_id" class="form-label">Vai trò hệ thống *</label>
            <select id="role_id" name="role_id" class="form-control" required>
                <option value="1" {% if user.MaVaiTro == 1 %}selected{% endif %}>Chủ doanh nghiệp / Admin</option>
                <option value="2" {% if user.MaVaiTro == 2 %}selected{% endif %}>Nhân viên quản lý / Vận hành</option>
                <option value="3" {% if user.MaVaiTro == 3 %}selected{% endif %}>Cộng tác viên / Sale (Môi giới)</option>
            </select>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
                <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
            </button>
            <a href="{{ url_for('admin_employees') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">
                Hủy bỏ
            </a>
        </div>
    </form>
</div>
{% endblock %}
